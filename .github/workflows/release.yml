name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            cli_artifact: mavlink-generator-x86_64-pc-windows-msvc.exe
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            cli_artifact: mavlink-generator-x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            cli_artifact: mavlink-generator-aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            ui/src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Build CLI
        run: cargo build --release --bin mavlink-generator --target ${{ matrix.rust_target }}

      - name: Stage CLI binary
        shell: bash
        run: |
          mkdir -p dist/cli
          cp "target/${{ matrix.rust_target }}/release/mavlink-generator"* dist/cli/${{ matrix.cli_artifact }}

      - name: Build desktop app
        working-directory: ui
        run: |
          pnpm install --frozen-lockfile
          pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Stage desktop installers
        shell: bash
        run: |
          mkdir -p dist/desktop
          shopt -s nullglob
          for path in \
            ui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi \
            ui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe \
            ui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb \
            ui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage \
            ui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg \
            ui/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app.tar.gz; do
            cp "$path" dist/desktop/
          done
          if [ -z "$(ls -A dist/desktop)" ]; then
            echo "No desktop installers were produced"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release archive
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
